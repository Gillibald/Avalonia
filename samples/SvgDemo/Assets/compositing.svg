<svg xmlns="http://www.w3.org/2000/svg" width="520" height="250" viewBox="0 0 520 250">
  <defs>
    <clipPath id="roundClip">
      <circle cx="95" cy="180" r="48"/>
      <rect x="95" y="132" width="60" height="96" rx="14"/>
    </clipPath>
    <!-- Luminance mask: white keeps, black removes -->
    <linearGradient id="fade" gradientUnits="userSpaceOnUse" x1="230" y1="0" x2="500" y2="0">
      <stop offset="0" stop-color="white"/>
      <stop offset="1" stop-color="black"/>
    </linearGradient>
    <mask id="fadeMask">
      <rect x="220" y="125" width="290" height="110" fill="url(#fade)"/>
    </mask>
  </defs>

  <!-- mix-blend-mode: multiply venn, isolated against the page -->
  <g style="isolation:isolate">
    <circle cx="70" cy="60" r="36" fill="#22d3ee" style="mix-blend-mode:multiply"/>
    <circle cx="110" cy="60" r="36" fill="#f472b6" style="mix-blend-mode:multiply"/>
    <circle cx="90" cy="92" r="36" fill="#facc15" style="mix-blend-mode:multiply"/>
  </g>
  <g style="isolation:isolate">
    <rect x="180" y="28" width="64" height="64" fill="#1e293b"/>
    <circle cx="244" cy="60" r="32" fill="#38bdf8" style="mix-blend-mode:screen"/>
    <circle cx="244" cy="92" r="32" fill="#fb7185" style="mix-blend-mode:screen"/>
  </g>

  <!-- Group opacity flattens once; per-shape opacity blends pairwise -->
  <g opacity="0.5">
    <rect x="320" y="30" width="56" height="56" fill="#dc2626"/>
    <rect x="350" y="55" width="56" height="56" fill="#dc2626"/>
  </g>
  <g>
    <rect x="430" y="30" width="56" height="56" fill="#dc2626" fill-opacity="0.5"/>
    <rect x="460" y="55" width="56" height="56" fill="#dc2626" fill-opacity="0.5"/>
  </g>

  <!-- clip-path over striped content -->
  <g clip-path="url(#roundClip)">
    <rect x="30" y="125" width="160" height="110" fill="#0ea5e9"/>
    <path d="M 30 145 h 160 M 30 175 h 160 M 30 205 h 160" stroke="#bae6fd" stroke-width="12"/>
  </g>

  <!-- Gradient luminance mask fading content out to the right -->
  <g mask="url(#fadeMask)">
    <rect x="225" y="130" width="280" height="100" rx="12" fill="#7c3aed"/>
    <circle cx="280" cy="180" r="30" fill="#fbbf24"/>
    <circle cx="370" cy="180" r="30" fill="#34d399"/>
    <circle cx="460" cy="180" r="30" fill="#f87171"/>
  </g>
</svg>
