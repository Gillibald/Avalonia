<svg xmlns="http://www.w3.org/2000/svg" width="520" height="250" viewBox="0 0 520 250">
  <defs>
    <linearGradient id="sky">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- gradientTransform rotates the object-bounding-box gradient -->
    <linearGradient id="sunset" gradientTransform="rotate(90 0.5 0.5)">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="0.5" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#fef9c3"/>
      <stop offset="0.55" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#b45309"/>
    </radialGradient>
    <!-- spreadMethod="reflect" mirrors the short gradient vector -->
    <linearGradient id="stripes" x2="0.18" y2="0" spreadMethod="reflect">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <!-- One user-space gradient shared by separate shapes -->
    <linearGradient id="shared" gradientUnits="userSpaceOnUse" x1="20" y1="0" x2="500" y2="0">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="0.5" stop-color="#84cc16" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <!-- Pattern tiles in user space, plus a transformed dot grid -->
    <pattern id="checker" patternUnits="userSpaceOnUse" width="24" height="24">
      <rect width="24" height="24" fill="#f1f5f9"/>
      <rect width="12" height="12" fill="#475569"/>
      <rect x="12" y="12" width="12" height="12" fill="#475569"/>
    </pattern>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="22" height="22" patternTransform="rotate(15)">
      <circle cx="11" cy="11" r="4.5" fill="#0f766e"/>
    </pattern>
  </defs>

  <rect x="20" y="20" width="110" height="90" rx="10" fill="url(#sky)"/>
  <rect x="150" y="20" width="110" height="90" rx="10" fill="url(#sunset)"/>
  <circle cx="335" cy="65" r="46" fill="url(#glow)"/>
  <rect x="400" y="20" width="100" height="90" rx="10" fill="url(#stripes)"/>

  <rect x="20" y="135" width="225" height="40" rx="8" fill="url(#shared)"/>
  <circle cx="300" cy="155" r="22" fill="url(#shared)"/>
  <rect x="350" y="135" width="150" height="40" rx="8" fill="url(#shared)"/>

  <rect x="20" y="195" width="225" height="38" rx="8" fill="url(#checker)" stroke="#475569"/>
  <rect x="275" y="195" width="225" height="38" rx="8" fill="url(#dots)" stroke="#0f766e"/>
</svg>
