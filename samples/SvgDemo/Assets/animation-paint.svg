<svg xmlns="http://www.w3.org/2000/svg" width="520" height="170" viewBox="0 0 520 170">
  <!-- Every animation here targets a shape's own fill/stroke color, so the
       whole document runs on the paint channel: it compiles once into a
       compositor-bound recording and only brush colors mutate per tick. -->

  <circle cx="70" cy="70" r="40" fill="#ef4444">
    <animate attributeName="fill" values="#ef4444;#f59e0b;#ef4444" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <rect x="150" y="30" width="110" height="80" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="6">
    <animate attributeName="stroke" values="#3b82f6;#8b5cf6;#ec4899;#3b82f6" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Discrete steps: a status LED cycling through states -->
  <circle cx="330" cy="70" r="26" fill="#22c55e" stroke="#0f172a" stroke-width="3">
    <animate attributeName="fill" values="#22c55e;#f59e0b;#dc2626" dur="3s"
             calcMode="discrete" repeatCount="indefinite"/>
  </circle>

  <!-- begin offsets stagger one shared color wave -->
  <rect x="400" y="35" width="22" height="70" rx="5" fill="#0ea5e9">
    <animate attributeName="fill" values="#0ea5e9;#a5f3fc;#0ea5e9" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="432" y="35" width="22" height="70" rx="5" fill="#0ea5e9">
    <animate attributeName="fill" values="#0ea5e9;#a5f3fc;#0ea5e9" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="464" y="35" width="22" height="70" rx="5" fill="#0ea5e9">
    <animate attributeName="fill" values="#0ea5e9;#a5f3fc;#0ea5e9" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
</svg>
