<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="16" fill="#0b1022"/>

  <!-- Outer ring of dots, rotating clockwise — composition channel (server-side). -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
                      from="0 50 50" to="360 50 50" dur="6s" repeatCount="indefinite"/>
    <circle cx="50" cy="18" r="6" fill="#f59e0b"/>
    <circle cx="82" cy="50" r="6" fill="#2563eb"/>
    <circle cx="50" cy="82" r="6" fill="#10b981"/>
    <circle cx="18" cy="50" r="6" fill="#f472b6"/>
  </g>

  <!-- Inner bar, counter-rotating — composition channel. -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
                      from="360 50 50" to="0 50 50" dur="4s" repeatCount="indefinite"/>
    <rect x="46" y="26" width="8" height="48" rx="4" fill="#22d3ee"/>
  </g>

  <!-- Pulsing halo — composition channel (opacity). -->
  <circle cx="50" cy="50" r="13" fill="#e2e8f0">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Colour-cycling core — paint channel (per-instance brush mutation). -->
  <circle cx="50" cy="50" r="6">
    <animate attributeName="fill" values="#ef4444;#3b82f6;#22c55e;#ef4444" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
