<svg xmlns="http://www.w3.org/2000/svg" width="520" height="250" viewBox="0 0 520 250">
  <defs>
    <!-- A symbol establishes its own viewport; each use scales it -->
    <symbol id="pin" viewBox="0 0 24 24">
      <path d="M 12 2 C 7.5 2 4 5.6 4 10 c 0 5.6 8 12 8 12 s 8 -6.4 8 -12 C 20 5.6 16.5 2 12 2 Z" fill="#dc2626"/>
      <circle cx="12" cy="10" r="3.4" fill="white"/>
    </symbol>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7"
            orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
    <marker id="joint" refX="4" refY="4" markerWidth="8" markerHeight="8">
      <circle cx="4" cy="4" r="3.2" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- The same symbol at three sizes -->
  <use href="#pin" x="25" y="20" width="36" height="36"/>
  <use href="#pin" x="80" y="20" width="56" height="56"/>
  <use href="#pin" x="155" y="20" width="84" height="84"/>

  <!-- Reusing a rendered group: the original plus two placed copies -->
  <g id="badge">
    <circle cx="300" cy="55" r="26" fill="#1d4ed8"/>
    <circle cx="300" cy="55" r="26" fill="none" stroke="#bfdbfe" stroke-width="4" stroke-dasharray="4 3"/>
    <circle cx="300" cy="55" r="10" fill="#bfdbfe"/>
  </g>
  <use href="#badge" x="75" y="12"/>
  <use href="#badge" x="150" y="-14"/>

  <!-- Markers: auto-start-reverse arrowheads, dots on every interior vertex -->
  <path d="M 40 200 C 110 140 180 245 260 185 S 420 150 480 200" fill="none"
        stroke="#64748b" stroke-width="3"
        marker-start="url(#arrow)" marker-mid="url(#joint)" marker-end="url(#arrow)"/>
  <polyline points="40,235 150,225 260,235 370,225 480,235" fill="none"
            stroke="#94a3b8" stroke-width="2" marker-mid="url(#joint)"/>
</svg>
